<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Workflow Visualizer</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="site-header">
    <h1>Workflow Visualizer</h1>
  </header>

  <main class="layout">
    <aside class="sidebar">
      <h2>Workflows</h2>
      <div id="workflow-list"></div>
      <form id="create-workflow-form">
        <input type="text" id="workflow-name-input" placeholder="New workflow name" required>
        <button type="submit">Add</button>
      </form>
    </aside>

    <section class="main-panel">
      <div id="steps-panel">
        <p class="empty-hint">Select a workflow to see its steps.</p>
      </div>
    </section>
  </main>

  <!-- api.js has no DOM access; app.js wires everything together -->
  <script type="module" src="app.js"></script>
</body>
</html>
